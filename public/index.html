<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #020408; --bg2: #060d14; --bg3: #0a1520;
  --border: #0f2a3a; --border2: #1a4060;
  --accent: #00ff88; --accent2: #00c8ff; --accent3: #ff0055;
  --text: #c8e8f0; --text2: #6b9ab0; --text3: #3a6070;
}

html, body { height: 100%; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; background-image: linear-gradient(rgba(0,255,136,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.012) 1px,transparent 1px); background-size: 40px 40px; }

.app { display: grid; grid-template-columns: 265px 1fr; grid-template-rows: 54px 1fr; height: 100vh; }

/* HEADER */
.header { grid-column:1/-1; display:flex; align-items:center; gap:14px; padding:0 18px; border-bottom:1px solid var(--border2); background:rgba(6,13,20,.97); position:relative; z-index:10; }
.header::after { content:''; position:absolute; bottom:0;left:0;right:0;height:1px; background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent); animation:glow-line 4s ease-in-out infinite; }
@keyframes glow-line { 0%,100%{opacity:.4}50%{opacity:1} }
.logo { font-family:'Orbitron',monospace; font-size:17px; font-weight:900; letter-spacing:4px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-sub { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text3); letter-spacing:2px; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.dot { width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 6px var(--accent)}50%{opacity:.3;box-shadow:none} }
.stat-txt { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text3); letter-spacing:1px; }
#stat-count { color:var(--accent); }

/* HEADER BUTTONS */
.hdr-action { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px; padding:4px 10px; background:transparent; border:1px solid var(--border2); color:var(--text3); cursor:pointer; text-transform:uppercase; transition:all .2s; }
.hdr-action:hover { border-color:var(--accent2); color:var(--accent2); }
.hdr-action.active { border-color:var(--accent); color:var(--accent); background:rgba(0,255,136,.07); }

/* SIDEBAR */
.sidebar { border-right:1px solid var(--border); background:var(--bg2); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-top { padding:10px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:8px; }
.search-box { width:100%; background:var(--bg3); border:1px solid var(--border2); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:11px; padding:7px 10px; outline:none; letter-spacing:1px; transition:border-color .2s; }
.search-box::placeholder { color:var(--text3); }
.search-box:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(0,255,136,.15); }
.cat-tabs { display:flex; }
.cat-tab { flex:1; padding:6px 4px; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; text-align:center; cursor:pointer; color:var(--text3); border:1px solid transparent; background:transparent; text-transform:uppercase; transition:all .2s; }
.cat-tab.active { color:var(--accent); background:rgba(0,255,136,.06); border-color:rgba(0,255,136,.2); }
.cat-tab:hover:not(.active) { color:var(--text2); background:rgba(255,255,255,.02); }
.ai-count { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text3); padding:5px 10px; border-bottom:1px solid var(--border); letter-spacing:1px; }
.ai-list { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:3px; }
.ai-list::-webkit-scrollbar { width:2px; }
.ai-list::-webkit-scrollbar-thumb { background:var(--border2); }

.ai-item { padding:9px 10px; cursor:pointer; border:1px solid transparent; display:flex; align-items:center; gap:9px; transition:all .15s; position:relative; }
.ai-item:hover { background:rgba(255,255,255,.02); border-color:var(--border); }
.ai-item.active { background:rgba(0,255,136,.05); border-color:var(--accent); }
.ai-item.active::before { content:''; position:absolute; left:0;top:0;bottom:0;width:2px; background:var(--accent); box-shadow:0 0 8px var(--accent); }
.ai-item.compare-selected { background:rgba(0,200,255,.05); border-color:var(--accent2); }
.ai-item.compare-selected::before { background:var(--accent2); box-shadow:0 0 8px var(--accent2); }
.ai-icon { font-size:15px; flex-shrink:0; width:20px; text-align:center; }
.ai-info { flex:1; min-width:0; }
.ai-name { font-family:'Orbitron',monospace; font-size:9px; font-weight:700; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ai-desc { font-size:9px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.ai-actions { display:flex; gap:4px; flex-shrink:0; }
.ai-badge { font-family:'Share Tech Mono',monospace; font-size:7px; padding:2px 4px; text-transform:uppercase; letter-spacing:1px; border:1px solid; }
.badge-chat { color:var(--accent); border-color:rgba(0,255,136,.25); background:rgba(0,255,136,.07); }
.badge-img  { color:#ff4081; border-color:rgba(255,64,129,.25); background:rgba(255,64,129,.07); }
.fav-btn { background:transparent; border:none; cursor:pointer; font-size:11px; opacity:.3; transition:opacity .2s; padding:0; line-height:1; }
.fav-btn.active { opacity:1; }

/* MAIN */
.main { display:flex; flex-direction:column; overflow:hidden; }

/* Empty */
.empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; opacity:.4; }
.empty-icon { font-family:'Orbitron',monospace; font-size:44px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.empty-txt { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text3); letter-spacing:2px; }

/* Chat header */
.chat-header { padding:10px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--bg2); flex-shrink:0; }
.ch-icon { font-size:20px; }
.ch-name { font-family:'Orbitron',monospace; font-size:12px; font-weight:700; letter-spacing:2px; }
.ch-desc { font-size:10px; color:var(--text3); margin-top:1px; }
.ch-right { margin-left:auto; display:flex; gap:6px; }
.hdr-btn { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px; padding:4px 8px; background:transparent; border:1px solid var(--border2); color:var(--text3); cursor:pointer; text-transform:uppercase; transition:all .2s; }
.hdr-btn:hover { border-color:var(--accent); color:var(--accent); }
.hdr-btn.danger:hover { border-color:var(--accent3); color:var(--accent3); }

/* Messages */
.messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
.messages::-webkit-scrollbar { width:2px; }
.messages::-webkit-scrollbar-thumb { background:var(--border2); }

.welcome-msg { text-align:center; margin-top:40px; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text3); letter-spacing:2px; }
.welcome-msg .wm-icon { font-size:32px; display:block; margin-bottom:12px; }
.welcome-msg p { margin-top:8px; font-size:9px; }

.msg { display:flex; gap:9px; animation:fadein .2s ease; }
@keyframes fadein { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none} }
.msg.user { flex-direction:row-reverse; }
.msg-av { width:28px;height:28px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-family:'Share Tech Mono',monospace; }
.msg.user .msg-av { background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--accent);font-size:9px;letter-spacing:1px; }
.msg.ai .msg-av { background:rgba(0,200,255,.05);border:1px solid var(--border2); }

.msg-wrap { max-width:72%; }
.msg-bubble { padding:10px 14px; font-size:13px; line-height:1.7; position:relative; }
.msg.user .msg-bubble { background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.2);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;word-break:break-word; }
.msg.ai .msg-bubble { background:var(--bg2);border:1px solid var(--border);color:var(--text); }

/* Markdown styles */
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { font-family:'Orbitron',monospace; color:var(--accent2); margin:.6em 0 .3em; font-size:1em; letter-spacing:1px; }
.msg-bubble p { margin:.4em 0; }
.msg-bubble ul,.msg-bubble ol { padding-left:1.4em; margin:.4em 0; }
.msg-bubble li { margin:.2em 0; }
.msg-bubble code { font-family:'Share Tech Mono',monospace; background:rgba(0,255,136,.08); border:1px solid rgba(0,255,136,.15); padding:1px 5px; font-size:.9em; color:var(--accent); border-radius:2px; }
.msg-bubble pre { background:var(--bg3); border:1px solid var(--border2); padding:10px; margin:.6em 0; overflow-x:auto; border-radius:2px; position:relative; }
.msg-bubble pre code { background:none; border:none; padding:0; color:var(--text); font-size:.85em; }
.msg-bubble strong { color:var(--accent2); font-weight:600; }
.msg-bubble em { color:var(--text2); font-style:italic; }
.msg-bubble blockquote { border-left:2px solid var(--accent); padding-left:10px; color:var(--text2); margin:.4em 0; }
.msg-bubble a { color:var(--accent2); text-decoration:none; }
.msg-bubble a:hover { text-decoration:underline; }
.msg-bubble table { border-collapse:collapse; width:100%; margin:.4em 0; font-size:.9em; }
.msg-bubble th { background:rgba(0,255,136,.08); border:1px solid var(--border2); padding:5px 8px; color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:.85em; }
.msg-bubble td { border:1px solid var(--border); padding:4px 8px; }
.msg-bubble hr { border:none; border-top:1px solid var(--border2); margin:.6em 0; }

.msg-meta { display:flex; align-items:center; gap:8px; margin-top:4px; }
.msg-time { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text3); }
.copy-btn { font-family:'Share Tech Mono',monospace; font-size:8px; padding:2px 6px; background:transparent; border:1px solid var(--border); color:var(--text3); cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition:all .2s; opacity:0; }
.msg-wrap:hover .copy-btn { opacity:1; }
.copy-btn:hover { border-color:var(--accent); color:var(--accent); }
.copy-btn.copied { border-color:var(--accent); color:var(--accent); }

/* Cache indicator */
.cache-tag { font-family:'Share Tech Mono',monospace; font-size:7px; padding:1px 4px; border:1px solid rgba(255,200,0,.2); color:rgba(255,200,0,.6); letter-spacing:1px; }

.msg-img { max-width:280px; border:1px solid var(--border2); display:block; margin-top:6px; }
.img-caption { font-size:9px; color:var(--text3); font-family:'Share Tech Mono',monospace; margin-top:4px; }
.error-bubble { color:var(--accent3); font-family:'Share Tech Mono',monospace; font-size:10px; padding:8px 12px; border:1px solid rgba(255,0,85,.3); background:rgba(255,0,85,.05); }

/* Typing */
.typing { display:flex;gap:5px;align-items:center;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);width:fit-content; }
.t-dot { width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:blink 1.2s ease-in-out infinite; }
.t-dot:nth-child(2){animation-delay:.2s}.t-dot:nth-child(3){animation-delay:.4s}
@keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)} }

/* Input */
.input-area { padding:10px 18px; border-top:1px solid var(--border); background:var(--bg2); display:flex; gap:8px; align-items:flex-end; flex-shrink:0; }
.input-wrap { flex:1; position:relative; }
.corner { position:absolute; width:7px;height:7px; border-color:var(--accent); border-style:solid; }
.corner.tl{top:-1px;left:-1px;border-width:1px 0 0 1px}.corner.tr{top:-1px;right:-1px;border-width:1px 1px 0 0}
.corner.bl{bottom:-1px;left:-1px;border-width:0 0 1px 1px}.corner.br{bottom:-1px;right:-1px;border-width:0 1px 1px 0}
.chat-input { width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:9px 12px;outline:none;resize:none;min-height:38px;max-height:110px;letter-spacing:.5px;line-height:1.6;transition:border-color .2s; }
.chat-input::placeholder { color:var(--text3); }
.chat-input:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(0,255,136,.12); }
.send-btn { padding:9px 16px;background:rgba(0,255,136,.1);border:1px solid var(--accent);color:var(--accent);font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;cursor:pointer;transition:all .2s;white-space:nowrap;height:38px;text-transform:uppercase; }
.send-btn:hover:not(:disabled) { background:rgba(0,255,136,.2);box-shadow:0 0 14px rgba(0,255,136,.3); }
.send-btn:disabled { opacity:.3;cursor:not-allowed; }

/* COMPARE MODE */
.compare-panel { display:none; flex-direction:column; height:100%; overflow:hidden; }
.compare-panel.active { display:flex; }
.compare-header { padding:10px 18px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.compare-title { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; color:var(--accent2); }
.compare-selected-list { display:flex; gap:6px; flex-wrap:wrap; margin-left:10px; }
.compare-tag { font-family:'Share Tech Mono',monospace; font-size:8px; padding:2px 7px; border:1px solid var(--border2); color:var(--text2); letter-spacing:1px; }
.compare-body { display:flex; flex:1; overflow:hidden; gap:1px; background:var(--border); }
.compare-col { flex:1; display:flex; flex-direction:column; background:var(--bg); overflow:hidden; min-width:0; }
.compare-col-header { padding:8px 12px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; gap:8px; flex-shrink:0; }
.compare-col-icon { font-size:14px; }
.compare-col-name { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:1px; }
.compare-col-msgs { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }
.compare-col-msgs::-webkit-scrollbar { width:2px; }
.compare-col-msgs::-webkit-scrollbar-thumb { background:var(--border2); }
.compare-msg { padding:8px 10px; font-size:12px; line-height:1.6; }
.compare-msg.user { background:rgba(0,255,136,.05); border:1px solid rgba(0,255,136,.15); color:var(--accent); font-family:'Share Tech Mono',monospace; font-size:10px; }
.compare-msg.ai { background:var(--bg2); border:1px solid var(--border); }
.compare-msg.error { color:var(--accent3); border:1px solid rgba(255,0,85,.2); background:rgba(255,0,85,.04); font-family:'Share Tech Mono',monospace; font-size:10px; }
.compare-msg.loading { color:var(--text3); font-family:'Share Tech Mono',monospace; font-size:10px; }
.compare-input { padding:10px 18px; border-top:1px solid var(--border); background:var(--bg2); display:flex; gap:8px; flex-shrink:0; }
.compare-input input { flex:1; background:var(--bg3); border:1px solid var(--border2); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:12px; padding:8px 12px; outline:none; letter-spacing:.5px; transition:border-color .2s; }
.compare-input input::placeholder { color:var(--text3); }
.compare-input input:focus { border-color:var(--accent2); }

/* MODAL - Status */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(2,4,8,.85); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border2); width:520px; max-height:80vh; display:flex; flex-direction:column; }
.modal-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; color:var(--accent2); }
.modal-close { background:transparent; border:none; color:var(--text3); font-size:16px; cursor:pointer; padding:0; }
.modal-close:hover { color:var(--accent3); }
.modal-body { flex:1; overflow-y:auto; padding:14px 18px; }
.modal-body::-webkit-scrollbar { width:2px; }
.modal-body::-webkit-scrollbar-thumb { background:var(--border2); }
.status-summary { display:flex; gap:12px; margin-bottom:14px; }
.status-card { flex:1; padding:10px; border:1px solid var(--border); text-align:center; }
.status-card .sc-num { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; }
.status-card .sc-lbl { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--text3); margin-top:2px; }
.status-row { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid var(--border); font-family:'Share Tech Mono',monospace; font-size:10px; }
.status-dot-sm { width:6px;height:6px;border-radius:50%;flex-shrink:0; }
.status-name { flex:1; color:var(--text2); letter-spacing:.5px; }
.status-badge { font-size:8px; padding:1px 5px; border:1px solid; letter-spacing:1px; }
.s-up { color:var(--accent); border-color:rgba(0,255,136,.3); }
.s-down { color:var(--accent3); border-color:rgba(255,0,85,.3); }
.s-error { color:#ffaa00; border-color:rgba(255,170,0,.3); }
.status-ms { color:var(--text3); font-size:9px; width:50px; text-align:right; }
.status-loading { text-align:center; padding:30px; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text3); letter-spacing:2px; }

.hidden { display:none !important; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div>
      <div class="logo">AI<span style="color:#00c8ff">HUB</span></div>
      <div class="logo-sub">// SCRAPER NETWORK</div>
    </div>
    <div class="header-right">
      <button class="hdr-action" id="compareToggle">⊞ COMPARE</button>
      <button class="hdr-action" id="statusBtn">◉ STATUS</button>
      <div class="dot"></div>
      <div class="stat-txt"><span id="stat-count">0</span> NODES</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <input class="search-box" id="searchBox" placeholder="SEARCH NODE..." autocomplete="off">
      <div class="cat-tabs">
        <button class="cat-tab active" data-cat="all">ALL</button>
        <button class="cat-tab" data-cat="chat">CHAT</button>
        <button class="cat-tab" data-cat="image">IMAGE</button>
        <button class="cat-tab" data-cat="fav">★ FAV</button>
      </div>
    </div>
    <div class="ai-count" id="aiCount">— NODES</div>
    <div class="ai-list" id="aiList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea">

    <!-- EMPTY -->
    <div class="empty" id="emptyState">
      <div class="empty-icon">⬡</div>
      <div class="empty-txt">SELECT A NODE</div>
      <div class="empty-txt" style="font-size:9px;margin-top:4px">TO BEGIN TRANSMISSION</div>
    </div>

    <!-- CHAT PANEL -->
    <div id="chatPanel" class="hidden" style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
      <div class="chat-header">
        <div class="ch-icon" id="chIcon"></div>
        <div>
          <div class="ch-name" id="chName"></div>
          <div class="ch-desc" id="chDesc"></div>
        </div>
        <div class="ch-right">
          <button class="hdr-btn" id="exportBtn">↓ EXPORT</button>
          <button class="hdr-btn danger" id="clearBtn">✕ CLEAR</button>
        </div>
      </div>
      <div class="messages" id="messages">
        <div class="welcome-msg" id="welcomeMsg">
          <span class="wm-icon" id="welcomeIcon"></span>
          <div id="welcomeTitle"></div>
          <p id="welcomeSub"></p>
        </div>
      </div>
      <div class="input-area">
        <div class="input-wrap">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Send a message..."></textarea>
        </div>
        <button class="send-btn" id="sendBtn">SEND</button>
      </div>
    </div>

    <!-- COMPARE PANEL -->
    <div class="compare-panel" id="comparePanel">
      <div class="compare-header">
        <div class="compare-title">⊞ COMPARE MODE</div>
        <div class="compare-selected-list" id="compareSelectedList"></div>
        <div style="margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3)">SELECT UP TO 3 AI FROM SIDEBAR</div>
      </div>
      <div class="compare-body" id="compareBody"></div>
      <div class="compare-input">
        <input id="compareInput" placeholder="Send same prompt to all selected AIs... (Enter)">
        <button class="send-btn" id="compareSendBtn" style="font-size:8px">SEND ALL</button>
      </div>
    </div>

  </main>
</div>

<!-- STATUS MODAL -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">◉ NODE STATUS</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="status-loading">CHECKING NODES...</div>
    </div>
  </div>
</div>

<script>
// Configure marked
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true })
}

function renderMarkdown(text) {
  if (typeof marked === 'undefined') return escHtml(text)
  try { return marked.parse(text) } catch(e) { return escHtml(text) }
}

// ─── AI Config ────────────────────────────────────────────────────────────────
const AI_LIST = [
  { id:'aoshi',       name:'Aoshi',        icon:'⬥', color:'#e040fb', type:'chat',  param:'q',        desc:'Custom persona AI' },
  { id:'copilot',     name:'Copilot',      icon:'◫', color:'#40c4ff', type:'chat',  param:'q',        desc:'Microsoft Copilot' },

  { id:'publicai',    name:'Public AI',    icon:'◭', color:'#ea80fc', type:'chat',  param:'q',        desc:'Public AI' },
  { id:'bibleai',     name:'Bible AI',     icon:'✦', color:'#ffd740', type:'chat',  param:'q',        desc:'Bible-focused AI' },
  { id:'blackbox',    name:'Blackbox',     icon:'▣', color:'#ff1744', type:'chat',  param:'q',        desc:'Blackbox AI coding' },
  { id:'bypassai',    name:'Bypass AI',    icon:'◩', color:'#00e5ff', type:'chat',  param:'q',        desc:'Bypass AI' },
  { id:'chathub',     name:'ChatHub',      icon:'◪', color:'#76ff03', type:'chat',  param:'q',        desc:'ChatHub multi-model' },
  { id:'claude',      name:'Claude Haiku', icon:'⬟', color:'#ffcc02', type:'chat',  param:'text',     desc:'Claude via deepai.org' },
  { id:'deepai',      name:'DeepAI',       icon:'◧', color:'#ff6d00', type:'chat',  param:'q',        desc:'DeepAI chat' },
  { id:'deepseek',    name:'DeepSeek',     icon:'◉', color:'#7c4dff', type:'chat',  param:'q',        desc:'DeepSeek AI' },
  { id:'dyronai',     name:'DyronAI',      icon:'⬠', color:'#18ffff', type:'chat',  param:'q',        desc:'DyronAI' },
  { id:'esp',         name:'ESP AI',       icon:'⬢', color:'#aeea00', type:'chat',  param:'q',        desc:'ChatEspanyol AI' },
  { id:'gemini',      name:'Gemini',       icon:'◇', color:'#4fc3f7', type:'chat',  param:'q',        desc:'Google Gemini' },
  { id:'genweb',      name:'GenWeb',       icon:'◰', color:'#ff80ab', type:'chat',  param:'q',        desc:'GenWeb AI' },
  { id:'gita',        name:'Gita AI',      icon:'◱', color:'#b388ff', type:'chat',  param:'q',        desc:'Gita AI' },
  { id:'gpt',         name:'GPT-4o',       icon:'◈', color:'#00ff88', type:'chat',  param:'q',        desc:'OpenAI GPT-4o' },
  { id:'grok',        name:'Grok',         icon:'⬡', color:'#ff6e40', type:'chat',  param:'q',        desc:'Grok via toolbaz' },
  { id:'heckai',      name:'Heck AI',      icon:'◲', color:'#ff9e80', type:'chat',  param:'q',        desc:'HeckAI' },
  { id:'iask',        name:'iAsk',         icon:'◳', color:'#84ffff', type:'chat',  param:'q',        desc:'iAsk.ai' },
  { id:'kimi',        name:'Kimi K2',      icon:'◎', color:'#ff4081', type:'chat',  param:'q',        desc:'Moonshot Kimi-K2' },
  { id:'metaai',      name:'Meta AI',      icon:'◴', color:'#0040ff', type:'chat',  param:'q',        desc:'Meta AI' },
  { id:'muslimai',    name:'Muslim AI',    icon:'◵', color:'#00c853', type:'chat',  param:'q',        desc:'Muslim AI' },
  { id:'notegpt',     name:'NoteGPT',      icon:'◷', color:'#ff3d00', type:'chat',  param:'q',        desc:'NoteGPT' },
  { id:'openai',      name:'OpenAI',       icon:'◌', color:'#69f0ae', type:'chat',  param:'q',        desc:'OpenAI' },
  { id:'scite',       name:'Scite AI',     icon:'◸', color:'#64dd17', type:'chat',  param:'q',        desc:'Scite research AI' },
  { id:'soymascol',   name:'Soymascol',    icon:'◹', color:'#aa00ff', type:'chat',  param:'q',        desc:'Soymascol AI' },
  { id:'svara',       name:'Svara',        icon:'◺', color:'#00b0ff', type:'chat',  param:'q',        desc:'Svara AI' },
  { id:'talkai',      name:'Talk AI',      icon:'◻', color:'#ff6f00', type:'chat',  param:'q',        desc:'TalkAI' },
  { id:'turboseek',   name:'TurboSeek',    icon:'◼', color:'#d500f9', type:'chat',  param:'q',        desc:'TurboSeek AI' },
  { id:'venice',      name:'Venice AI',    icon:'◽', color:'#0091ea', type:'chat',  param:'q',        desc:'Venice.ai' },
  { id:'zerogpt',     name:'ZeroGPT',      icon:'◾', color:'#ff3d00', type:'chat',  param:'q',        desc:'ZeroGPT detector' },
  { id:'fluximg',     name:'Flux Image',   icon:'⬦', color:'#ff4081', type:'image', param:'prompt',   desc:'Flux via pollinations' },
  { id:'text2img',    name:'Text2Img',     icon:'⬧', color:'#69f0ae', type:'image', param:'q',        desc:'ZonerAI txt2img' },
  { id:'petimg',      name:'Pet Image',    icon:'⬨', color:'#ffd740', type:'image', param:'q',        desc:'Pet image generator' },
  { id:'imgtoprompt', name:'Img→Prompt',   icon:'⬩', color:'#40c4ff', type:'image', param:'url',      desc:'Image to prompt' },
  { id:'nanobanana',  name:'NanoBanana',   icon:'◶', color:'#ffea00', type:'image', param:'imageUrl', desc:'Magic Eraser AI' },
  { id:'seaart',      name:'SeaArt',       icon:'⬪', color:'#76ff03', type:'image', param:'q',        desc:'SeaArt character chat' },
]

// ─── State ────────────────────────────────────────────────────────────────────
let selectedAI = null
let messages = {}
let loading = false
let currentCat = 'all'
let searchQ = ''
let compareMode = false
let compareSelected = []  // array of ai ids (max 3)
let compareMessages = {}  // { aiId: [{role, text, type}] }
let favorites = JSON.parse(localStorage.getItem('aihub_favs') || '[]')

// ─── DOM ──────────────────────────────────────────────────────────────────────
const aiListEl     = document.getElementById('aiList')
const aiCountEl    = document.getElementById('aiCount')
const statCountEl  = document.getElementById('stat-count')
const emptyState   = document.getElementById('emptyState')
const chatPanel    = document.getElementById('chatPanel')
const comparePanel = document.getElementById('comparePanel')
const messagesEl   = document.getElementById('messages')
const chatInput    = document.getElementById('chatInput')
const sendBtn      = document.getElementById('sendBtn')
const clearBtn     = document.getElementById('clearBtn')
const exportBtn    = document.getElementById('exportBtn')
const compareToggle= document.getElementById('compareToggle')
const statusBtn    = document.getElementById('statusBtn')
const statusModal  = document.getElementById('statusModal')
const modalClose   = document.getElementById('modalClose')
const modalBody    = document.getElementById('modalBody')
const chIcon       = document.getElementById('chIcon')
const chName       = document.getElementById('chName')
const chDesc       = document.getElementById('chDesc')
const welcomeMsg   = document.getElementById('welcomeMsg')
const welcomeIcon  = document.getElementById('welcomeIcon')
const welcomeTitle = document.getElementById('welcomeTitle')
const welcomeSub   = document.getElementById('welcomeSub')
const searchBox    = document.getElementById('searchBox')
const compareInput = document.getElementById('compareInput')
const compareSendBtn = document.getElementById('compareSendBtn')
const compareBody  = document.getElementById('compareBody')
const compareSelList = document.getElementById('compareSelectedList')

// ─── Init ─────────────────────────────────────────────────────────────────────
statCountEl.textContent = AI_LIST.length
renderList()

// ─── Render sidebar ───────────────────────────────────────────────────────────
function renderList() {
  const filtered = AI_LIST.filter(ai => {
    const matchCat = currentCat === 'all' || ai.type === currentCat || (currentCat === 'fav' && favorites.includes(ai.id))
    const matchQ = !searchQ || ai.name.toLowerCase().includes(searchQ) || ai.desc.toLowerCase().includes(searchQ)
    return matchCat && matchQ
  })

  aiCountEl.textContent = `${filtered.length} / ${AI_LIST.length} NODES`
  aiListEl.innerHTML = ''

  filtered.forEach(ai => {
    const isActive = !compareMode && selectedAI?.id === ai.id
    const isCmpSel = compareMode && compareSelected.includes(ai.id)
    const isFav = favorites.includes(ai.id)

    const el = document.createElement('div')
    el.className = 'ai-item' + (isActive ? ' active' : '') + (isCmpSel ? ' compare-selected' : '')
    el.innerHTML = `
      <div class="ai-icon" style="color:${ai.color}">${ai.icon}</div>
      <div class="ai-info">
        <div class="ai-name" style="color:${isActive||isCmpSel ? ai.color : ''}">${ai.name}</div>
        <div class="ai-desc">${ai.desc}</div>
      </div>
      <div class="ai-actions">
        <button class="fav-btn${isFav?' active':''}" data-id="${ai.id}" title="Favorite">${isFav?'★':'☆'}</button>
        <div class="ai-badge ${ai.type==='image'?'badge-img':'badge-chat'}">${ai.type==='image'?'IMG':'TXT'}</div>
      </div>
    `
    el.querySelector('.fav-btn').addEventListener('click', e => {
      e.stopPropagation()
      toggleFav(ai.id)
    })
    el.addEventListener('click', () => {
      if (compareMode) toggleCompare(ai)
      else selectAI(ai)
    })
    aiListEl.appendChild(el)
  })
}

// ─── Favorites ───────────────────────────────────────────────────────────────
function toggleFav(id) {
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id)
  else favorites.push(id)
  localStorage.setItem('aihub_favs', JSON.stringify(favorites))
  renderList()
}

// ─── Select AI (normal chat) ──────────────────────────────────────────────────
function selectAI(ai) {
  selectedAI = ai
  renderList()
  showPanel('chat')

  chIcon.textContent = ai.icon
  chIcon.style.color = ai.color
  chName.textContent = ai.name
  chName.style.color = ai.color
  chDesc.textContent = ai.desc
  welcomeIcon.textContent = ai.icon
  welcomeIcon.style.color = ai.color
  welcomeTitle.textContent = `CHANNEL OPEN :: ${ai.name.toUpperCase()}`
  welcomeSub.textContent = ai.type === 'image' ? 'Describe the image...' : 'Send a message to start...'
  chatInput.placeholder = ai.type === 'image' ? `Describe image for ${ai.name}...` : `Message ${ai.name}... (Enter)`
  renderMessages()
  chatInput.focus()
}

// ─── Show panel ───────────────────────────────────────────────────────────────
function showPanel(mode) {
  emptyState.classList.add('hidden')
  chatPanel.classList.add('hidden')
  chatPanel.style.display = 'none'
  comparePanel.classList.remove('active')

  if (mode === 'chat') {
    chatPanel.classList.remove('hidden')
    chatPanel.style.display = 'flex'
  } else if (mode === 'compare') {
    comparePanel.classList.add('active')
  } else {
    emptyState.classList.remove('hidden')
  }
}

// ─── Compare Mode ─────────────────────────────────────────────────────────────
compareToggle.addEventListener('click', () => {
  compareMode = !compareMode
  compareToggle.classList.toggle('active', compareMode)

  if (compareMode) {
    compareSelected = []
    renderComparePanel()
    showPanel('compare')
  } else {
    if (selectedAI) showPanel('chat')
    else showPanel('empty')
  }
  renderList()
})

function toggleCompare(ai) {
  if (compareSelected.includes(ai.id)) {
    compareSelected = compareSelected.filter(id => id !== ai.id)
  } else {
    if (compareSelected.length >= 3) return
    compareSelected.push(ai.id)
  }
  renderComparePanel()
  renderList()
}

function renderComparePanel() {
  // Selected tags
  compareSelList.innerHTML = compareSelected.map(id => {
    const ai = AI_LIST.find(a => a.id === id)
    return `<span class="compare-tag" style="color:${ai.color};border-color:${ai.color}40">${ai.icon} ${ai.name}</span>`
  }).join('')

  // Columns
  compareBody.innerHTML = ''
  if (compareSelected.length === 0) {
    compareBody.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--text3);letter-spacing:2px;opacity:.4">SELECT AI FROM SIDEBAR</div>'
    return
  }

  compareSelected.forEach(id => {
    const ai = AI_LIST.find(a => a.id === id)
    if (!compareMessages[id]) compareMessages[id] = []

    const col = document.createElement('div')
    col.className = 'compare-col'
    col.id = `cmp-col-${id}`

    const msgs = (compareMessages[id] || []).map(m => {
      const cls = m.role === 'user' ? 'user' : (m.type === 'error' ? 'error' : 'ai')
      const content = m.role === 'ai' && m.type !== 'error' ? renderMarkdown(m.text) : escHtml(m.text)
      return `<div class="compare-msg ${cls}">${content}</div>`
    }).join('')

    col.innerHTML = `
      <div class="compare-col-header">
        <div class="compare-col-icon" style="color:${ai.color}">${ai.icon}</div>
        <div class="compare-col-name" style="color:${ai.color}">${ai.name}</div>
      </div>
      <div class="compare-col-msgs" id="cmp-msgs-${id}">${msgs || '<div style="padding:20px;font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--text3);text-align:center;letter-spacing:1px">STANDBY</div>'}</div>
    `
    compareBody.appendChild(col)
  })
}

compareSendBtn.addEventListener('click', sendCompare)
compareInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendCompare() })

async function sendCompare() {
  const q = compareInput.value.trim()
  if (!q || compareSelected.length === 0) return
  compareInput.value = ''
  compareSendBtn.disabled = true

  // Add user msg to all
  compareSelected.forEach(id => {
    if (!compareMessages[id]) compareMessages[id] = []
    compareMessages[id].push({ role:'user', type:'text', text: q })
    const msgsEl = document.getElementById(`cmp-msgs-${id}`)
    if (msgsEl) {
      msgsEl.innerHTML += `<div class="compare-msg user">${escHtml(q)}</div>`
      msgsEl.innerHTML += `<div class="compare-msg loading" id="cmp-loading-${id}">▪▪▪</div>`
      msgsEl.scrollTop = msgsEl.scrollHeight
    }
  })

  // Fire all in parallel
  await Promise.all(compareSelected.map(async id => {
    const ai = AI_LIST.find(a => a.id === id)
    try {
      const res = await fetch(`/api/${ai.id}?${ai.param}=${encodeURIComponent(q)}`)
      const data = await res.json()
      if (!res.ok || data.status === false) throw new Error(data.message || data.error || `HTTP ${res.status}`)
      const text = data.response || data.result || data.data || data.message || JSON.stringify(data, null, 2)
      const str = typeof text === 'string' ? text : JSON.stringify(text, null, 2)
      compareMessages[id].push({ role:'ai', type:'text', text: str })
      const loadEl = document.getElementById(`cmp-loading-${id}`)
      if (loadEl) { loadEl.className = 'compare-msg ai'; loadEl.innerHTML = renderMarkdown(str); loadEl.id = '' }
    } catch(err) {
      compareMessages[id].push({ role:'ai', type:'error', text: `Error: ${err.message}` })
      const loadEl = document.getElementById(`cmp-loading-${id}`)
      if (loadEl) { loadEl.className = 'compare-msg error'; loadEl.textContent = `Error: ${err.message}`; loadEl.id = '' }
    }
    const msgsEl = document.getElementById(`cmp-msgs-${id}`)
    if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight
  }))

  compareSendBtn.disabled = false
  compareInput.focus()
}

// ─── Render messages ──────────────────────────────────────────────────────────
function renderMessages() {
  if (!selectedAI) return
  const msgs = messages[selectedAI.id] || []
  while (messagesEl.children.length > 1) messagesEl.removeChild(messagesEl.lastChild)
  welcomeMsg.style.display = msgs.length === 0 ? 'block' : 'none'
  msgs.forEach(m => messagesEl.appendChild(createMsgEl(m)))
  scrollBottom()
}

function createMsgEl(m) {
  const wrap = document.createElement('div')
  wrap.className = `msg ${m.role}`

  const av = document.createElement('div')
  av.className = 'msg-av'
  if (m.role === 'user') av.textContent = 'YOU'
  else av.innerHTML = `<span style="color:${selectedAI.color}">${selectedAI.icon}</span>`

  const wrapInner = document.createElement('div')
  wrapInner.className = 'msg-wrap'

  const bubble = document.createElement('div')
  bubble.className = 'msg-bubble'

  if (m.type === 'image') {
    bubble.innerHTML = `<img class="msg-img" src="${m.imgUrl}" alt="generated"><div class="img-caption">${escHtml(m.text||'')}</div>`
  } else if (m.type === 'error') {
    bubble.innerHTML = `<div class="error-bubble">${escHtml(m.text)}</div>`
    bubble.style.cssText = 'padding:0;background:none;border:none'
  } else if (m.role === 'ai') {
    bubble.innerHTML = renderMarkdown(m.text)
  } else {
    bubble.textContent = m.text
  }

  const meta = document.createElement('div')
  meta.className = 'msg-meta'

  const time = document.createElement('span')
  time.className = 'msg-time'
  time.textContent = m.time || ''

  if (m.cached) {
    const tag = document.createElement('span')
    tag.className = 'cache-tag'
    tag.textContent = 'CACHED'
    meta.appendChild(tag)
  }

  // Copy button (only for AI text messages)
  if (m.role === 'ai' && m.type !== 'error' && m.type !== 'image') {
    const copyBtn = document.createElement('button')
    copyBtn.className = 'copy-btn'
    copyBtn.textContent = 'COPY'
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(m.text).then(() => {
        copyBtn.textContent = '✓ COPIED'
        copyBtn.classList.add('copied')
        setTimeout(() => { copyBtn.textContent = 'COPY'; copyBtn.classList.remove('copied') }, 2000)
      })
    })
    meta.appendChild(copyBtn)
  }

  meta.appendChild(time)
  wrapInner.appendChild(bubble)
  wrapInner.appendChild(meta)
  wrap.appendChild(av)
  wrap.appendChild(wrapInner)
  return wrap
}

function addTyping() {
  const wrap = document.createElement('div')
  wrap.className = 'msg ai'; wrap.id = 'typingIndicator'
  wrap.innerHTML = `<div class="msg-av"><span style="color:${selectedAI.color}">${selectedAI.icon}</span></div><div class="typing"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`
  messagesEl.appendChild(wrap)
  scrollBottom()
}

function removeTyping() { document.getElementById('typingIndicator')?.remove() }
function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight }

// ─── Send message ─────────────────────────────────────────────────────────────
async function sendMessage() {
  if (!selectedAI || loading) return
  const q = chatInput.value.trim()
  if (!q) return

  chatInput.value = ''
  chatInput.style.height = 'auto'
  loading = true; sendBtn.disabled = true; sendBtn.textContent = 'WAIT'

  const now = getTime()
  const userMsg = { role:'user', type:'text', text:q, time:now }
  if (!messages[selectedAI.id]) messages[selectedAI.id] = []
  messages[selectedAI.id].push(userMsg)
  welcomeMsg.style.display = 'none'
  messagesEl.appendChild(createMsgEl(userMsg))
  addTyping(); scrollBottom()

  try {
    const ai = selectedAI
    const url = `/api/${ai.id}?${ai.param}=${encodeURIComponent(q)}`
    const res = await fetch(url)
    const cacheHit = res.headers.get('X-Cache') === 'HIT'
    const contentType = res.headers.get('content-type') || ''
    let aiMsg

    if (contentType.includes('image')) {
      const blob = await res.blob()
      const imgUrl = URL.createObjectURL(blob)
      aiMsg = { role:'ai', type:'image', imgUrl, text:`Generated: "${q}"`, time:getTime() }
    } else {
      const data = await res.json()
      if (!res.ok || data.status === false) throw new Error(data.message || data.error || `HTTP ${res.status}`)
      const text = data.response || data.result || data.data || data.message || JSON.stringify(data, null, 2)
      aiMsg = { role:'ai', type:'text', text: typeof text === 'string' ? text : JSON.stringify(text,null,2), time:getTime(), cached: cacheHit }
    }

    messages[ai.id].push(aiMsg)
    removeTyping()
    messagesEl.appendChild(createMsgEl(aiMsg))
    scrollBottom()
  } catch(err) {
    const errMsg = { role:'ai', type:'error', text:`Error: ${err.message}`, time:getTime() }
    messages[selectedAI.id].push(errMsg)
    removeTyping()
    messagesEl.appendChild(createMsgEl(errMsg))
    scrollBottom()
  }

  loading = false; sendBtn.disabled = false; sendBtn.textContent = 'SEND'
  chatInput.focus()
}

// ─── Export chat ──────────────────────────────────────────────────────────────
exportBtn.addEventListener('click', () => {
  if (!selectedAI) return
  const msgs = messages[selectedAI.id] || []
  if (msgs.length === 0) return

  let txt = `AI HUB - Chat Export\n`
  txt += `AI: ${selectedAI.name}\n`
  txt += `Date: ${new Date().toLocaleString('id-ID')}\n`
  txt += `${'─'.repeat(40)}\n\n`

  msgs.forEach(m => {
    const who = m.role === 'user' ? 'YOU' : selectedAI.name.toUpperCase()
    txt += `[${m.time || ''}] ${who}:\n`
    if (m.type === 'image') txt += `[IMAGE] ${m.text}\n`
    else txt += `${m.text}\n`
    txt += '\n'
  })

  const blob = new Blob([txt], { type:'text/plain' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = `aihub-${selectedAI.id}-${Date.now()}.txt`
  a.click()
})

// ─── Status modal ─────────────────────────────────────────────────────────────
statusBtn.addEventListener('click', async () => {
  statusModal.classList.add('open')
  modalBody.innerHTML = '<div class="status-loading">⟳ CHECKING ALL NODES...</div>'

  try {
    const res = await fetch('/api/status')
    const data = await res.json()
    const { summary, results } = data

    const upColor = '#00ff88', downColor = '#ff0055', errColor = '#ffaa00'

    modalBody.innerHTML = `
      <div class="status-summary">
        <div class="status-card"><div class="sc-num" style="color:${upColor}">${summary.up}</div><div class="sc-lbl">UP</div></div>
        <div class="status-card"><div class="sc-num" style="color:${downColor}">${summary.down}</div><div class="sc-lbl">DOWN</div></div>
        <div class="status-card"><div class="sc-num" style="color:var(--text2)">${summary.total}</div><div class="sc-lbl">TOTAL</div></div>
      </div>
      ${results.sort((a,b) => a.status==='up'?-1:1).map(r => {
        const sColor = r.status==='up' ? upColor : r.status==='error' ? errColor : downColor
        const badgeCls = r.status==='up' ? 's-up' : r.status==='error' ? 's-error' : 's-down'
        return `<div class="status-row">
          <div class="status-dot-sm" style="background:${sColor}"></div>
          <div class="status-name">${r.name}</div>
          <div class="status-badge ${badgeCls}">${r.status.toUpperCase()}</div>
          <div class="status-ms">${r.ms}ms</div>
        </div>`
      }).join('')}
    `
  } catch(err) {
    modalBody.innerHTML = `<div class="status-loading" style="color:var(--accent3)">ERROR: ${err.message}</div>`
  }
})

modalClose.addEventListener('click', () => statusModal.classList.remove('open'))
statusModal.addEventListener('click', e => { if (e.target === statusModal) statusModal.classList.remove('open') })

// ─── Events ───────────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', sendMessage)
chatInput.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()} })
chatInput.addEventListener('input', () => { chatInput.style.height='auto'; chatInput.style.height=Math.min(chatInput.scrollHeight,110)+'px' })
clearBtn.addEventListener('click', () => { if(!selectedAI)return; messages[selectedAI.id]=[]; renderMessages() })
searchBox.addEventListener('input', e => { searchQ=e.target.value.toLowerCase(); renderList() })

document.querySelectorAll('.cat-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active')
    currentCat = btn.dataset.cat
    renderList()
  })
})

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getTime() { return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
